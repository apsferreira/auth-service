apiVersion: apps/v1
kind: Deployment
metadata:
  name: authservice-frontend
  namespace: staging
  labels:
    app: authservice-frontend
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authservice-frontend
  template:
    metadata:
      labels:
        app: authservice-frontend
        environment: staging
    spec:
      containers:
      - name: frontend
        image: ghcr.io/apsferreira/auth-service-frontend:staging
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
