# =============================================================================
# Auth Service — CI/CD Pipeline
# GitHub Actions + GHCR + ArgoCD GitOps
#
# Fluxo:
#   push main  → build + push :sha-{hash} + :latest → atualiza k8s manifest → ArgoCD sync
#   pull_request → build + test only (sem push)
# =============================================================================

name: CI/CD — Auth Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/apsferreira/auth-service-backend

jobs:
  # ---------------------------------------------------------------------------
  # CI: Build e Test do Backend (Go/Fiber)
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Run tests
        working-directory: backend
        run: go test ./... -v -cover

      - name: Setup Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push Backend Image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # CD: Atualiza K8s manifests com a nova tag (GitOps)
  # ---------------------------------------------------------------------------
  update-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update Backend image tag
        run: |
          sed -i "s|${{ env.IMAGE_BACKEND }}:.*|${{ env.IMAGE_BACKEND }}:sha-${{ steps.sha.outputs.short }}|g" \
            k8s/backend/deployment.yaml

      - name: Commit e Push manifests atualizados
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add k8s/backend/deployment.yaml
          git diff --staged --quiet || git commit -m "chore(k8s): atualiza imagem para sha-${{ steps.sha.outputs.short }} [skip ci]"
          git push
