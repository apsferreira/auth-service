# =============================================================================
# Auth Service — CI/CD Pipeline
# GitHub Actions + GHCR + ArgoCD GitOps
#
# Fluxo:
#   push main    → build + push :sha-{hash} + :latest → atualiza k8s/ → ArgoCD sync (prod)
#   push develop → build + push :staging → atualiza k8s-staging/ → ArgoCD sync (staging)
#   pull_request → build + test only (sem push)
# =============================================================================

name: CI/CD — Auth Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/apsferreira/auth-service-backend
  IMAGE_FRONTEND: ghcr.io/apsferreira/auth-service-frontend

jobs:
  # ---------------------------------------------------------------------------
  # CI: Build e Test do Backend (Go/Fiber)
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Resolve dependencies
        working-directory: backend
        run: go mod tidy

      - name: Run tests
        working-directory: backend
        run: go test ./... -v -cover

      - name: Setup Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push Backend Image (prod — main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e Push Backend Image (staging — develop)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # CI: Build do Frontend Admin (React/Vite)
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build Frontend Admin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps e build
        working-directory: frontend
        run: |
          npm ci
          npx vite build

      - name: Setup Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push Frontend Image (prod — main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e Push Frontend Image (staging — develop)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # CD: Atualiza K8s manifests de produção (GitOps — main)
  # ---------------------------------------------------------------------------
  update-manifests:
    name: Update K8s Manifests (prod)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update Backend image tag
        run: |
          sed -i "s|${{ env.IMAGE_BACKEND }}:.*|${{ env.IMAGE_BACKEND }}:sha-${{ steps.sha.outputs.short }}|g" \
            k8s/backend/deployment.yaml

      - name: Update Frontend image tag
        run: |
          sed -i "s|${{ env.IMAGE_FRONTEND }}:.*|${{ env.IMAGE_FRONTEND }}:sha-${{ steps.sha.outputs.short }}|g" \
            k8s/frontend/deployment.yaml

      - name: Commit e Push manifests atualizados
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add k8s/backend/deployment.yaml k8s/frontend/deployment.yaml
          git diff --staged --quiet || git commit -m "chore(k8s): atualiza imagens para sha-${{ steps.sha.outputs.short }} [skip ci]"
          git pull --rebase origin main
          git push

  # ---------------------------------------------------------------------------
  # CD: Atualiza K8s manifests de staging (GitOps — develop)
  # ArgoCD faz sync automático → namespace staging
  # ---------------------------------------------------------------------------
  update-staging-manifests:
    name: Update K8s Manifests (staging)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Força re-pull da imagem :staging nos manifests
        run: |
          sed -i "s|${{ env.IMAGE_BACKEND }}:.*|${{ env.IMAGE_BACKEND }}:staging|g" \
            k8s-staging/backend/deployment.yaml
          sed -i "s|${{ env.IMAGE_FRONTEND }}:.*|${{ env.IMAGE_FRONTEND }}:staging|g" \
            k8s-staging/frontend/deployment.yaml

      - name: Commit e Push manifests de staging
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add k8s-staging/backend/deployment.yaml k8s-staging/frontend/deployment.yaml
          git diff --staged --quiet || git commit -m "chore(k8s-staging): atualiza imagens staging [skip ci]"
          git pull --rebase origin develop
          git push
