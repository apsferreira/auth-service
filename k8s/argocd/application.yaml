apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service-production
  namespace: argocd
  labels:
    app: auth-service
    environment: production
    part-of: apsferreira
spec:
  project: default
  source:
    repoURL: git@github.com:apsferreira/auth-service.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 20
