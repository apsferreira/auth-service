# =============================================================================
# IngressRoute — Auth Service
# Traefik v3 + Cloudflare Tunnel
#
# Arquitetura de exposição:
#   auth.institutoitinerante.com.br/api/* → Backend API (OTP, login, validate)
#   auth.institutoitinerante.com.br/*     → Frontend Admin (SPA React)
#
# Segurança (Cloudflare Access):
#   - REGRA DE BYPASS: /api/v1/auth/* → público (OTP, login, validate chamados por mobile/frontend)
#   - REGRA PADRÃO: /* → exige autenticação (protege o admin panel)
#
# Motivação para hostname único:
#   - Mobile apps (React Native) e frontends (Libri, Nitro) chamam auth.institutoitinerante.com.br/api
#   - Admin panel consolidado no mesmo domínio, sem subdomain admin-auth separado
# =============================================================================

# API Backend: auth.institutoitinerante.com.br/api/*
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authservice-backend
  namespace: production
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`auth.institutoitinerante.com.br`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: authservice-backend
          port: 3010

---
# Frontend Admin: auth.institutoitinerante.com.br (SPA React)
# Cloudflare Access protege /* com bypass em /api/*
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authservice-frontend
  namespace: production
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`auth.institutoitinerante.com.br`)
      kind: Rule
      priority: 1
      services:
        - name: authservice-frontend
          port: 80
